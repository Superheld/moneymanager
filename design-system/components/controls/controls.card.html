<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>body{margin:0;background:var(--cream);font-family:var(--font-ui);color:var(--ink);padding:20px}
.lbl{font-size:var(--fs-eyebrow);font-weight:700;letter-spacing:var(--ls-eyebrow);text-transform:uppercase;color:var(--ink-3);margin:0 0 8px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_load.js"></script>
</head><body><div id="root"></div>
<script type="text/babel" data-presets="react">
(async function(){
  const {Button,SegmentedControl}=await window.loadDS(['Button.jsx','SegmentedControl.jsx']);
function Demo(){
  const [seg,setSeg]=React.useState('Gesamt');
  const [per,setPer]=React.useState('Monat');
  return <div>
    <div className="lbl">Button</div>
    <div className="row"><Button variant="primary" plus>Topf anlegen</Button><Button>Export ▾</Button><Button variant="ghost">Abbrechen</Button></div>
    <div className="lbl">SegmentedControl</div>
    <div className="row"><SegmentedControl value={seg} onChange={setSeg} options={['Gesamt','je Konto','je Kategorie']}/>
      <SegmentedControl value={per} onChange={setPer} options={['Monat','Jahr']}/></div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
})();
</script></body></html>
