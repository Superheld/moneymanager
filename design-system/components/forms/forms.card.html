<!-- @dsCard group="Components" viewport="700x460" name="Formular & Dialog" subtitle="Dialog · FormField · RadioCard · LiveResult" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>body{margin:0;background:var(--cream);font-family:var(--font-ui);color:var(--ink);padding:0;min-height:460px;position:relative}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_load.js"></script>
</head><body><div id="root"></div>
<script type="text/babel" data-presets="react">
(async function(){
  const {Dialog,FormField,Input,RadioCard,LiveResult,Button,Pill,CoverageTrack}=await window.loadDS(['Dialog.jsx','FormField.jsx','RadioCard.jsx','LiveResult.jsx','../core/Pill.jsx','../core/CoverageTrack.jsx','../controls/Button.jsx']);
function Demo(){
  return <Dialog title="Topf anlegen" subtitle="reservier Geld für später — gedeckt, nicht abgebucht"
    footer={<>{Button&&<Button>Abbrechen</Button>}<span style={{flex:1}}/>{Button&&<Button variant="primary">Topf anlegen</Button>}</>}>
    <FormField label="Art des Topfs" required>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <RadioCard title="Spartopf" selected tag={Pill&&<Pill variant="ok">Rücklage</Pill>} desc="planbarer Ersatz, inventarbasiert — Ziel wächst mit der Zeit"/>
        <RadioCard title="Puffer" tag={Pill&&<Pill>Rückstellung</Pill>} desc="ungewisse, aber erwartbare Verpflichtung"/>
      </div>
    </FormField>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:13}}>
      <FormField label="Wiederbeschaffung" required><Input value="14.400" suffix="€"/></FormField>
      <FormField label="Nutzungsdauer" required><Input value="8" suffix="Jahre"/></FormField>
      <FormField label="Bereits gespart"><Input value="5.000" suffix="€"/></FormField>
    </div>
    <LiveResult label="Ansparrate (berechnet)" value="+150 €" sub="14.400 € ÷ 8 Jahre ÷ 12">
      <div style={{marginTop:9,fontSize:12.5,color:'var(--ink-2)'}}>fachlich eine kalkulatorische Abschreibung — keine echte Buchung.</div>
    </LiveResult>
  </Dialog>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
})();
</script></body></html>
