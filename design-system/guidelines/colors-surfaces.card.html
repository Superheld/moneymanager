<!-- @dsCard group="Colors" viewport="700x150" name="Oberflächen & Linien" subtitle="warm-neutrale Basis (Hue ~80)" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--cream);font-family:var(--font-ui);padding:18px;color:var(--ink)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{width:150px}
.chip{height:58px;border-radius:var(--r-lg);border:1px solid var(--line)}
.nm{font-size:12px;font-weight:700;margin-top:8px}
.vr{font-size:11px;color:var(--ink-3);font-family:var(--font-num)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--cream)"></div><div class="nm">App-Hintergrund</div><div class="vr">--cream</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="nm">Karte / Fläche</div><div class="vr">--surface</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="nm">Subtile Füllung</div><div class="vr">--surface-2</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface);border-color:var(--ink)"></div><div class="nm">Linie</div><div class="vr">--line</div></div>
</div>
</body></html>
