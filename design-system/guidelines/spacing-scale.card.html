<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface);font-family:var(--font-ui);padding:20px;color:var(--ink)}
.row{display:flex;gap:18px;align-items:flex-end}
.c{text-align:center}
.b{background:var(--accent-wash);border:1px solid var(--accent);border-radius:4px}
.nm{font-size:10.5px;color:var(--ink-3);font-family:var(--font-num);margin-top:6px}
</style></head><body>
<div class="row">
  <div class="c"><div class="b" style="width:4px;height:4px"></div><div class="nm">1·4</div></div>
  <div class="c"><div class="b" style="width:8px;height:8px"></div><div class="nm">2·8</div></div>
  <div class="c"><div class="b" style="width:12px;height:12px"></div><div class="nm">3·12</div></div>
  <div class="c"><div class="b" style="width:16px;height:16px"></div><div class="nm">4·16</div></div>
  <div class="c"><div class="b" style="width:24px;height:24px"></div><div class="nm">6·24</div></div>
  <div class="c"><div class="b" style="width:32px;height:32px"></div><div class="nm">7·32</div></div>
  <div class="c"><div class="b" style="width:40px;height:40px"></div><div class="nm">8·40</div></div>
  <div class="c"><div class="b" style="width:48px;height:48px"></div><div class="nm">9·48</div></div>
</div>
</body></html>
