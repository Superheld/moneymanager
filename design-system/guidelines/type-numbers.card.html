<!-- @dsCard group="Type" viewport="700x150" name="Zahlen · Tabularziffern" subtitle="Beträge mit .num, − als Minus, € als Suffix" -->
<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface);font-family:var(--font-ui);padding:20px;color:var(--ink)}
table{border-collapse:collapse}
td{padding:6px 0;font-size:15px}
td.n{text-align:right;font-weight:700;padding-left:40px}
.c-um{color:var(--accent-deep)}.c-ert{color:var(--ok-deep)}
.s{color:var(--ink-3);font-size:13px}
</style></head><body>
<table>
<tr><td>Gehalt Anna</td><td class="n num c-ert">+2.900 €</td></tr>
<tr><td>Miete</td><td class="n num">−1.250 €</td></tr>
<tr><td>ETF-Sparplan <span class="s">Umschichtung</span></td><td class="n num c-um">−300 €</td></tr>
<tr><td>Strom</td><td class="n num">−89 €</td></tr>
</table>
</body></html>
