<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface);font-family:var(--font-ui);padding:18px;color:var(--ink)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{width:150px}
.chip{height:58px;border-radius:var(--r-lg)}
.nm{font-size:12px;font-weight:700;margin-top:8px}
.vr{font-size:11px;color:var(--ink-3);font-family:var(--font-num)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="nm" style="color:var(--ink)">Primär</div><div class="vr">--ink</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><div class="nm" style="color:var(--ink-2)">Sekundär</div><div class="vr">--ink-2</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><div class="nm" style="color:var(--ink-3)">Tertiär / Meta</div><div class="vr">--ink-3</div></div>
</div>
</body></html>
